name: Release LSP binaries

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: d2-lsp-darwin-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: d2-lsp-darwin-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: d2-lsp-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: d2-lsp-linux-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: d2-lsp-windows-amd64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Build
        working-directory: lsp
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -trimpath -ldflags "-s -w -X main.Version=${{ github.ref_name }}" -o ../${{ matrix.artifact }} .
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
